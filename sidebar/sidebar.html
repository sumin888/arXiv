<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>arXiv Agent</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div id="paper-info">
      <span id="paper-title">No paper detected</span>
      <span id="paper-authors"></span>
    </div>
    <div id="status-dot" class="dot idle" title="Agent status"></div>
  </header>

  <!-- Empty state shown before a paper is detected -->
  <div id="empty-state">
    <p>Navigate to an <strong>arxiv.org/abs/</strong> page to activate the agent.</p>
  </div>

  <!-- Chat area -->
  <div id="chat-container" hidden>
    <div id="messages"></div>
  </div>

  <!-- Input area -->
  <footer id="input-area" hidden>
    <textarea
      id="user-input"
      placeholder="Ask about this paper…"
      rows="2"
      autofocus
    ></textarea>
    <button id="send-btn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </footer>

  <script src="sidebar.js"></script>
</body>
</html>
